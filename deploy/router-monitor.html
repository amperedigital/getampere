<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="v3.507">
    <title>Ampere Router Monitor</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/amperedigital/getampere@v3.507/deploy/assets/css/styles.css">
    <style>
        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(-4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .live-dot {
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .new-row {
            animation: slide-in 0.2s ease-out;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.025);
        }

        .tier-t1 {
            color: #58a6ff;
        }

        .tier-t2 {
            color: #a371f7;
        }

        .tier-t3 {
            color: #d2a8ff;
            background: rgba(139, 92, 246, 0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .result-ok {
            color: #3fb950;
        }

        .result-fallback {
            color: #e3b341;
        }

        .result-error {
            color: #f85149;
        }

        .step-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'DM Sans', monospace;
            letter-spacing: .03em;
        }

        .step-CLASSIFY {
            background: #1c2d3f;
            color: #58a6ff;
        }

        .step-T1_ATTEMPT {
            background: #1a2a1c;
            color: #3fb950;
        }

        .step-T1_ACQUIRED {
            background: #1a2730;
            color: #79c0ff;
        }

        .step-T1_FIRST_BYTE {
            background: #1e2d13;
            color: #7ee787;
        }

        .step-T1_TOOL_CALL {
            background: #2d1f0a;
            color: #e3b341;
        }

        .step-T1_FALLBACK {
            background: #2d1e00;
            color: #f0883e;
            border: 1px solid #f0883e44;
        }

        .step-T2_ATTEMPT {
            background: #251a3b;
            color: #a371f7;
        }

        .step-T2_FALLBACK {
            background: #3b1a1f;
            color: #f85149;
            border: 1px solid #f8514944;
        }

        .step-T2_FIRST_BYTE {
            background: #2a1e3a;
            color: #d2a8ff;
        }

        .badge-wai {
            background: #1a2d1a;
            color: #3fb950;
        }

        .badge-gemini {
            background: #1e2340;
            color: #79c0ff;
        }

        .badge-openai {
            background: #1a1a1a;
            color: #8b949e;
        }

        .badge-inception {
            background: #2a1a2a;
            color: #e879f9;
        }

        .step-T3_ESCALATION {
            background: #3b1a3b;
            color: #e879f9;
            border: 1px solid #d946ef44;
            font-weight: 700;
        }

        .step-T3_PREWARM {
            background: #2d2200;
            color: #f59e0b;
            border: 1px solid #f59e0b55;
            font-weight: 700;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .step-T3_ATTEMPT {
            background: #2d1a3d;
            color: #d2a8ff;
        }

        .step-T3_FIRST_BYTE {
            background: #351a45;
            color: #c084fc;
        }

        .panel-scroll {
            max-height: calc(100vh - 240px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #30363d #0d1117;
        }

        .panel-scroll-sm {
            max-height: calc(100vh - 420px);
            min-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #30363d #0d1117;
        }

        .conn-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .conn-connected {
            background: #3fb950;
        }

        .conn-polling {
            background: #e3b341;
        }

        .conn-error {
            background: #f85149;
        }

        .turn-card {
            border-left: 3px solid #30363d;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 0 6px 6px 0;
            background: #0d1117;
        }

        .turn-card.active {
            border-left-color: #58a6ff;
        }

        .turn-user-msg {
            color: #e6edf3;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .turn-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
            color: #8b949e;
            align-items: center;
        }

        .ttfb-fast {
            color: #3fb950;
            font-weight: 600;
        }

        .ttfb-med {
            color: #e3b341;
            font-weight: 600;
        }

        .ttfb-slow {
            color: #f85149;
            font-weight: 600;
        }

        .step-SENTINEL_SCORE {
            background: #1a2a1c;
            color: #3fb950;
        }

        .step-T3_FALLBACK {
            background: #3b1a1f;
            color: #f85149;
            border: 1px solid #f8514944;
        }

        .step-STREAM_ABORTED {
            background: #3b1a0a;
            color: #f0883e;
            border: 1px solid #f0883e88;
            font-weight: 700;
        }

        .step-AGENT_RESPONSE {
            background: #1a2b2e;
            color: #7ee787;
        }

        .step-FACT_EXTRACTED {
            background: #1a2d1a;
            color: #3fb950;
            border: 1px solid #3fb95044;
        }

        .step-PREFETCH_DONE {
            background: #1a2a2a;
            color: #79c0ff;
        }

        .step-AGENT_PROMPT {
            background: #1a1a2e;
            color: #a371f7;
        }

        .step-HANDOFF_DETECTED {
            background: #2d1a0a;
            color: #f0883e;
            border: 1px solid #f0883e44;
        }

        .step-LANG_INJECTION {
            background: #2d2500;
            color: #f0c674;
            border: 1px solid #f0c67444;
        }

        .step-KB_INJECTED {
            background: #1a2533;
            color: #58a6ff;
            border: 1px solid #58a6ff33;
        }

        .step-INLINE_KB_INJECTED {
            background: #1a2533;
            color: #58a6ff;
            border: 1px solid #58a6ff33;
        }

        .step-ONE_VOICE {
            background: #1a2533;
            color: #79c0ff;
        }

        .step-SENTINEL_END_CALL {
            background: #1a1a2e;
            color: #a371f7;
            border: 1px solid #a371f733;
            font-weight: 700;
        }

        .step-VOICE_AUTH {
            background: #1a2d1a;
            color: #3fb950;
            border: 1px solid #3fb95033;
            font-weight: 600;
        }

        .step-INLINE_KB_PREFETCH {
            background: #252014;
            color: #e3b341;
        }

        .sentinel-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 6px;
        }

        .sentinel-dim {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'DM Sans', monospace;

            background: #1a2d1a;
            color: #3fb950;
        }

        .dim-yellow {
            background: #2d2500;
            color: #e3b341;

            color: #79c0ff;

            padding: 1px 5px;

            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            background: #1a1a2e;
            color: #8b949e;
            font-family: 'DM Sans', monospace;
        }

        .session-gauge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #161b22;
        }

        .gauge-green {
            color: #3fb950;
            border-color: #3fb95044;
        }

        .gauge-yellow {
            color: #e3b341;
            border-color: #e3b34144;
        }

        .gauge-red {
            color: #f85149;
            border-color: #f8514944;

<body class="bg-[#0d1117] text-[#e6edf3] min-h-screen p-4 sm:p-6">

    <!-- Header -->
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <div>
            <h1 class="text-xl font-bold text-blue-400 mb-0.5">⚡ Ampere Router Monitor</h1>
            <p class="text-xs text-[#8b949e]">Live events only — since page load / last clear</p>
        </div>
        <div class="flex items-center gap-3">
            <div id="sessionGauge" class="session-gauge" style="display:none;">
                <span>Sentinel</span>
                <span id="sessionAvgLabel">—</span>
            </div>
            <div id="connStatus"
                class="flex items-center gap-2 text-xs text-[#8b949e] bg-[#161b22] border border-[#30363d] px-3 py-1.5 rounded-full">
                <span id="connDot" class="conn-indicator conn-polling live-dot"></span>
                <span id="connLabel">Connecting...</span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap gap-2 mb-4 items-center">
        <input type="text" id="apiKey" placeholder="x-api-key" value="dev-secret-key"
            class="bg-[#161b22] border border-[#30363d] text-[#e6edf3] px-3 py-1.5 rounded-md text-xs font-mono w-44 focus:outline-none focus:border-blue-500">
        <input type="text" id="workspaceId" placeholder="workspace" value="ampere-emily"
            class="bg-[#161b22] border border-[#30363d] text-[#e6edf3] px-3 py-1.5 rounded-md text-xs font-mono w-32 focus:outline-none focus:border-blue-500">
        <select id="filterTier"
            class="bg-[#161b22] border border-[#30363d] text-[#8b949e] px-3 py-1.5 rounded-md text-xs focus:outline-none focus:border-blue-500">
            <option value="">All Tiers</option>
            <option value="tier1">Tier 1</option>
            <option value="tier2">Tier 2</option>
            <option value="tier3">Tier 3 🟣</option>
        </select>
        <select id="filterResult"
            class="bg-[#161b22] border border-[#30363d] text-[#8b949e] px-3 py-1.5 rounded-md text-xs focus:outline-none focus:border-blue-500">
            <option value="">All Results</option>
            <option value="ok">Success ✅</option>
            <option value="fallback">Fallback ⚠️</option>
        </select>
        <select id="filterLang"
            class="bg-[#161b22] border border-[#30363d] text-[#8b949e] px-3 py-1.5 rounded-md text-xs focus:outline-none focus:border-blue-500">
            <option value="">All Langs</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">Chinese 🇨🇳</option>
            <option value="ja">Japanese 🇯🇵</option>
            <option value="ko">Korean 🇰🇷</option>
            <option value="ar">Arabic 🇸🇦</option>
            <option value="fa">Persian 🇮🇷</option>
            <option value="foreign">Foreign 🌐</option>
            <option value="hi">Hindi 🇮🇳</option>
            <option value="ru">Russian 🇷🇺</option>
        </select>
        <button onclick="clearAll()"
            class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] text-[#8b949e] px-3 py-1.5 rounded-md text-xs cursor-pointer transition-colors">🗑
            Clear</button>
        <button onclick="reconnect()"
            class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-1.5 rounded-md text-xs font-semibold cursor-pointer transition-colors">⟳
            Reconnect</button>
        <span class="text-xs text-[#8b949e] ml-auto" id="eventCount">0 events</span>
    </div>

    <!-- Routing Table (full width) -->
    <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden mb-4">
        <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between">
            <h2 class="text-sm font-semibold text-[#e6edf3]">Routing Table</h2>
            <span class="text-xs text-[#8b949e]" id="routeCount">0 turns</span>
        </div>
        <div class="panel-scroll">
            <table class="w-full text-xs border-collapse">
                <thead class="sticky top-0 bg-[#161b22] z-10">
                    <tr class="text-[#8b949e] text-left">
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Time</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">reqId</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Tier</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Model</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Bknd</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">ACQ</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">TTFB</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]"
                            title="Total minus TTFB = TTS + router overhead">TTS/OH</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Total</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Tools</th>
                        <th class="px-3 py-2 font-medium border-b border-[#30363d]">Result</th>
                    </tr>
                </thead>
                <tbody id="routingTbody">
                    <tr>
                        <td colspan="11" class="px-4 py-8 text-center text-[#8b949e] text-xs">Waiting for events…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bottom two panels -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

        <!-- Turn-by-Turn -->
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
            <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between">
                <h2 class="text-sm font-semibold text-[#e6edf3]">Turn-by-Turn</h2>
                <span class="text-xs text-[#8b949e]" id="turnCount">0 turns</span>
            </div>
            <div class="panel-scroll-sm px-2 py-1" id="turnPanel">
                <div class="px-4 py-6 text-center text-[#8b949e] text-xs" id="turnPlaceholder">Waiting for conversation…
                </div>
            </div>
        </div>

        <!-- Raw Event Stream -->
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
            <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between">
                <h2 class="text-sm font-semibold text-[#e6edf3]">Event Stream</h2>
                <div class="flex items-center gap-3">
                    <button onclick="copyEventLog()" id="copyLogBtn"
                        class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] text-[#8b949e] px-2.5 py-1 rounded-md text-xs cursor-pointer transition-colors">📋
                        Copy Log</button>
                    <label class="text-xs text-[#8b949e] flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" id="autoScroll" checked class="accent-blue-500"> auto-scroll
                    </label>
                </div>
            </div>
            <div class="panel-scroll-sm" id="eventStream">
                <div class="px-4 py-6 text-center text-[#8b949e] text-xs" id="streamPlaceholder">Waiting for events…
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin.includes('localhost')
            ? 'http://localhost:8787'
            : 'https://memory-api.tight-butterfly-7b71.workers.dev';

        let sessionStart = Date.now();
        let routeMap = {};
        let totalEvents = 0;
        let pollInterval = null;
        let ws = null;
        let seenReqIds = new Set();
        let latestSessionAvg = null;

        const LANG_FLAGS = { en: '🇺🇸', zh: '🇨🇳', ja: '🇯🇵', ko: '🇰🇷', ar: '🇸🇦', fa: '🇮🇷', hi: '🇮🇳', ru: '🇷🇺', ur: '🇵🇰', bn: '🇧🇩', ta: '🇱🇰', foreign: '🌐' };
        const DIM_LABELS = { a: 'ACC', g: 'GND', h: 'HLP', cm: 'CMP', cn: 'CON', e: 'EMP', s: 'SAF', co: 'COH', n: 'NAT' };

        const fmt = {
            time: ts => new Date(ts).toLocaleTimeString('en-US', { hour12: false }),
            ms: v => v != null ? `${v}ms` : '—',
            model: m => {
                if (!m) return '—';
                return m.replace('@cf/ibm-granite/', '').replace('@cf/meta/', '').replace('@cf/google/', '')
                    .replace('gemini:', '').replace('openai:', '').replace('inception:', '').replace('-instruct', '').replace('-fp8-fast', '');
            },
            backend: b => {
                const cls = (b === 'workersai' || b === 'workersai-hf') ? 'badge-wai' : b === 'gemini' ? 'badge-gemini' : b === 'inception' ? 'badge-inception' : b === 'qwen' ? 'badge-qwen' : b === 'deepseek' ? 'badge-deepseek' : 'badge-openai';
                const label = b === 'workersai' ? 'CF' : b === 'workersai-hf' ? 'HF' : b === 'gemini' ? 'GEM' : b === 'inception' ? 'INC' : b === 'qwen' ? 'QWN' : b === 'deepseek' ? 'DS' : 'OAI';
                return `<span class="step-badge ${cls}">${label}</span>`;
            },
            tier: t => {
                if (!t) return '—';
                if (t === 'tier3') return `<span class="tier-t3 font-semibold">T3 🔒</span>`;
                return `<span class="${t === 'tier1' ? 'tier-t1' : 'tier-t2'} font-semibold">${t === 'tier1' ? 'T1' : 'T2'}</span>`;
            },
            result: r => {
                if (!r) return '<span class="text-[#8b949e]">…</span>';
                if (r === 'ok') return '<span class="result-ok font-semibold">✅</span>';
                if (r === 'fallback') return '<span class="result-fallback font-semibold">⚠️ fallback</span>';
                return '<span class="result-error font-semibold">❌</span>';
            },
            tools: arr => arr && arr.length ? arr.map(t => `<span class="text-[#e3b341] text-[10px]">${t}</span>`).join(' ') : '—',
            ttfb: ms => {
                if (ms == null) return '<span class="text-[#8b949e]">—</span>';
                const cls = ms < 300 ? 'ttfb-fast' : ms < 1000 ? 'ttfb-med' : 'ttfb-slow';
                return `<span class="${cls}">${ms}ms</span>`;
            },
            score: s => {
                if (s == null) return '—';
                const cls = s >= 8 ? 'dim-green' : s >= 6 ? 'dim-yellow' : 'dim-red';
                return `<span class="sentinel-dim ${cls}">${s}</span>`;
            },
            lang: (l, country) => {
                if (!l) return '';
                const flag = LANG_FLAGS[l] || '🌐';
                return `<span class="lang-badge">${flag} ${l}</span>`;
            },
            geo: (country, colo) => {
                if (!country) return '';
                return `<span class="geo-badge">${country}${colo ? ' · ' + colo : ''}</span>`;
            }
        };

        function stepBadge(s) { return `<span class="step-badge step-${s}">${s}</span>`; }
        function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        /** Collapse ElevenLabs retries: group turns with identical lastUserMsg within 10s, keep the best one */
        function dedupTurns(turns) {
            const groups = [];
            const used = new Set();
            for (const t of turns) {
                if (used.has(t.reqId)) continue;
                // Find all turns with same lastUserMsg within 10s
                const msg = (t.lastUserMsg || '').trim().toLowerCase();
                if (!msg) { groups.push({ winner: t, attempts: 1 }); used.add(t.reqId); continue; }
                const cluster = turns.filter(o => {
                    if (used.has(o.reqId)) return false;
                    const oMsg = (o.lastUserMsg || '').trim().toLowerCase();
                    return oMsg === msg && Math.abs(o.ts - t.ts) < 10000;
                });
                // Pick the best: prefer one with result='ok', then one with agentResponse, then latest
                const winner = cluster.sort((a, b) => {
                    if (a.result === 'ok' && b.result !== 'ok') return -1;
                    if (b.result === 'ok' && a.result !== 'ok') return 1;
                    if (a.agentResponse && !b.agentResponse) return -1;
                    if (b.agentResponse && !a.agentResponse) return 1;
                    return b.ts - a.ts;
                })[0];
                cluster.forEach(c => used.add(c.reqId));
                groups.push({ winner, attempts: cluster.length });
            }
            return groups;
        }

        function processEvent(ev, fromPoll = false) {
            if (!ev || ev.type !== 'router_event') return;
            if ((ev.ts || 0) < sessionStart) return;
            const { reqId, step } = ev;
            if (!reqId) return;

            const evKey = `${ev.ts}-${reqId}-${step}`;
            if (seenEventKeys.has(evKey)) return; // Already processed — skip entirely
            seenEventKeys.add(evKey);
            totalEvents++;
            document.getElementById('eventCount').textContent = `${totalEvents} events`;

            if (!routeMap[reqId]) {
                routeMap[reqId] = { reqId, ts: ev.ts, tier: null, model: null, backend: null, acq_ms: null, ttfb_ms: null, tools: [], result: null, fallback: null, lastUserMsg: '', agentResponse: '', classify_ms: null, total_ms: null };
            }
            seenReqIds.add(reqId);
            const row = routeMap[reqId];

            if (step === 'CLASSIFY') { row.tier = ev.tier; row.lastUserMsg = ev.lastUserMsg || ''; row.classify_ms = ev.classify_ms ?? null; row.lang = ev.lang; row.country = ev.country; row.colo = ev.colo; row.lmaOverride = ev.lmaOverride || false; }
            if (step === 'LMA_OVERRIDE') { row.lmaOverride = true; row.lmaT2 = ev.t2; row.lmaT3 = ev.t3; }
            if (step === 'LANG_INJECTION') { row.langInjection = true; row.langDirective = ev.directive || ''; row.langInjectionTier = ev.tier || ''; }
            if (step === 'T1_ATTEMPT') { row.tier = 'tier1'; row.model = ev.model; row.backend = ev.backend; }
            if (step === 'T2_ATTEMPT') { row.tier = 'tier2'; row.model = ev.model; row.backend = ev.backend; if (ev.coaching) row.coaching = ev.coaching; }
            if (step === 'T3_ESCALATION') { row.tier = 'tier3'; row.escalationReason = ev.trigger || ev.reason || 'escalated'; row.t3Locked = true; }
            if (step === 'T3_ATTEMPT') { row.tier = 'tier3'; row.model = ev.model; row.backend = ev.backend; }
            if (step === 'T3_FALLBACK') { row.result = 'fallback'; row.fallback = ev.fallback; }
            if (step === 'T1_ACQUIRED') { row.acq_ms = ev.acq_ms; if (!row.model) row.model = ev.model; if (!row.backend) row.backend = ev.backend; }
            if (step === 'T1_FIRST_BYTE' || step === 'T2_FIRST_BYTE' || step === 'T3_FIRST_BYTE') { row.ttfb_ms = ev.ttfb_ms; row.result = 'ok'; if (!row.model && ev.model) row.model = ev.model; }
            if (step === 'T1_TOOL_CALL') { if (!row.tools.includes(ev.tool)) row.tools.push(ev.tool); }
            if (step === 'T1_FALLBACK' || step === 'T2_FALLBACK') { row.result = 'fallback'; row.fallback = ev.fallback; }
            if (step === 'AGENT_RESPONSE') { row.agentResponse = ev.responsePreview || ''; row.total_ms = ev.total_ms ?? null; row.result = row.result || 'ok'; }
            if (step === 'SENTINEL_SCORE') {
                row.sentinel = { scores: ev.scores, turnAvg: ev.turnAvg, sessionAvg: ev.sessionAvg, judge: ev.judge, coaching: ev.coaching, locked: ev.locked };
                row.sentinelLastUserMsg = ev.lastUserMsg || '';
                row.sentinelAssistantPreview = ev.assistantPreview || '';
                row.sentinelKbContent = ev.kbContent || '';
                if (ev.facts && ev.facts.length > 0) { row.facts = ev.facts; row.factCount = ev.facts.length; }
                latestSessionAvg = ev.sessionAvg;
                updateSessionGauge(ev.sessionAvg);
            }
            if (step === 'FACT_EXTRACTED') {
                row.facts = ev.facts || [];
                row.factCount = ev.count || 0;
            }
            if (step === 'HANDOFF_DETECTED') {
                row.handoff = { from: ev.from, to: ev.to };
            }
            if (step === 'PREFETCH_DONE') {
                row.prefetchItems = ev.contextItems || 0;
            }
            if (step === 'AGENT_PROMPT') {
                row.agent = ev.agent;
            }
            if (step === 'KB_INJECTED' || step === 'INLINE_KB_INJECTED') {
                row.kbInjected = true;
                row.kbIntent = ev.intent || '';
                row.kbChunks = ev.chunkCount ?? ev.chunks ?? 0;
                row.kbQuery = ev.query || '';
                row.kbContent = ev.contentPreview || '';
                row.kbSource = ev.source || 'sentinel';
            }
            if (step === 'ONE_VOICE') {
                row.specialist = ev.specialist || '';
                row.kbChars = ev.injections ?? 0;
            }
            if (step === 'SENTINEL_END_CALL') {
                row.endedBysentinel = true;
            }
            if (step === 'VOICE_AUTH') {
                row.voiceAuth = { status: ev.status || 'unknown', score: ev.score ?? 0 };
            }
            if (step === 'T3_PREWARM') {
                row.t3Prewarm = true;
                row.t3PrewarmModel = ev.model || '';
                row.t3PrewarmAvg = ev.sessionAvg ?? null;
            }

            // Debounce rendering to prevent constant flashing from rapid-fire events
            if (!processEvent._renderTimer) {
                processEvent._renderTimer = setTimeout(() => {
                    renderRoutingTable();
                    renderTurnPanel();
                    processEvent._renderTimer = null;
                }, 200);
            }
            renderRawEvent(ev);
        }

        function renderRoutingTable() {
            const tierFilter = document.getElementById('filterTier').value;
            const resultFilter = document.getElementById('filterResult').value;
            const langFilter = document.getElementById('filterLang').value;
            const rows = Object.values(routeMap).sort((a, b) => a.ts - b.ts).slice(0, 200).filter(r => {
                if (tierFilter && r.tier !== tierFilter) return false;
                if (resultFilter === 'ok' && r.result !== 'ok') return false;
                if (resultFilter === 'fallback' && r.result !== 'fallback') return false;
                if (langFilter && r.lang !== langFilter) return false;
                return true;
            });
            document.getElementById('routeCount').textContent = `${rows.length} turns`;
            const tbody = document.getElementById('routingTbody');
            if (!rows.length) { tbody.innerHTML = '<tr><td colspan="11" class="px-4 py-8 text-center text-[#8b949e] text-xs">No matching events</td></tr>'; return; }
            tbody.innerHTML = rows.map(r => {
                const modelLabel = r.fallback
                    ? `<span class="font-mono text-[#c9d1d9]">${fmt.model(r.model)}</span><span class="text-[#8b949e]">→${fmt.model(r.fallback)}</span>`
                    : `<span class="font-mono text-[#c9d1d9]">${fmt.model(r.model)}</span>`;
                const sentinelHtml = r.sentinel ? `<span title="Sentinel: ${r.sentinel.turnAvg}">${fmt.score(r.sentinel.turnAvg)}</span>` : '';
                // Detect retries: same lastUserMsg within 10s
                const msg = (r.lastUserMsg || '').trim().toLowerCase();
                const retryCount = msg ? rows.filter(o => (o.lastUserMsg || '').trim().toLowerCase() === msg && Math.abs(o.ts - r.ts) < 10000).length : 0;
                const retryBadge = retryCount > 1 ? `<span style="color:#f0883e;font-size:10px;margin-left:4px;" title="ElevenLabs sent ${retryCount} attempts for this user message">🔄 ×${retryCount}</span>` : '';
                return `<tr class="border-b border-[#21262d] new-row${r.t3Locked ? ' style="background:rgba(139,92,246,0.08);"' : ''}">
                    <td class="px-3 py-2 text-[#8b949e] whitespace-nowrap">${fmt.time(r.ts)}${retryBadge}</td>
                    <td class="px-3 py-2 font-mono text-[#8b949e] text-[10px]">${r.reqId}</td>
                    <td class="px-3 py-2">${fmt.tier(r.tier)} ${r.t3Prewarm && !r.t3Locked ? '<span class="step-badge step-T3_PREWARM" title="T3 pre-warm fired (sessionAvg ' + (r.t3PrewarmAvg ?? '?') + ')">⚡ T3 WARM</span>' : ''} ${fmt.lang(r.lang)} ${fmt.geo(r.country, r.colo)}</td>
                    <td class="px-3 py-2">${modelLabel}</td>
                    <td class="px-3 py-2">${fmt.backend(r.backend)}</td>
                    <td class="px-3 py-2 text-right font-mono text-[#8b949e]">${fmt.ms(r.acq_ms)}</td>
                    <td class="px-3 py-2 text-right">${fmt.ttfb(r.ttfb_ms)}</td>
                    <td class="px-3 py-2 text-right font-mono" style="color:${(r.total_ms && r.ttfb_ms && (r.total_ms - r.ttfb_ms) > 500) ? '#f85149' : '#8b949e'};">${(r.total_ms != null && r.ttfb_ms != null) ? (r.total_ms - r.ttfb_ms) + 'ms' : '—'}</td>
                    <td class="px-3 py-2 text-right font-mono" style="color:#d2a8ff;">${r.total_ms != null ? r.total_ms + 'ms' : '—'}</td>
                    <td class="px-3 py-2">${fmt.tools(r.tools)}</td>
                    <td class="px-3 py-2">${fmt.result(r.result)} ${sentinelHtml}</td>
                </tr>`;
            }).join('');
        }

        function renderTurnPanel() {
            const allTurns = Object.values(routeMap).sort((a, b) => a.ts - b.ts); // oldest at top, newest at bottom

                const resultHtml = r.result === 'ok' ? '<span class="result-ok">✅</span>' : r.result === 'fallback' ? `<span class="result-fallback">⚠️ →${fmt.model(r.fallback)}</span>` : '<span class="text-[#8b949e]">⏳</span>';
                // Sentinel score card with expandable evaluation context

                            : '<div style="color:#6e7681;font-size:10px;margin-bottom:4px;">ℹ️ No KB was injected (general turn)</div>';

                            ? `<div style="margin-bottom:6px;"><div style="color:#79c0ff;font-size:10px;font-weight:600;margin-bottom:2px;">👤 User asked:</div><div style="color:#c9d1d9;font-size:11px;background:#0d1117;padding:5px 8px;border-radius:4px;border-left:2px solid #58a6ff;">${esc(r.sentinelLastUserMsg)}</div></div>`
                            : '';

                            ? `<div><div style="color:#3fb950;font-size:10px;font-weight:600;margin-bottom:2px;">🤖 Emily responded (what Sentinel scored):</div><div style="color:#adbac7;font-size:11px;background:#0d1117;padding:5px 8px;border-radius:4px;border-left:2px solid #3fb950;overflow-wrap:break-word;">${esc(r.sentinelAssistantPreview)}</div></div>`
                            : '';
                        evalCtxHtml = `<details style="margin-top:5px;border-top:1px solid #30363d;padding-top:5px;">
                            <summary style="cursor:pointer;font-size:10px;color:#8b949e;list-style:none;">🔍 Evaluation context (click to expand)</summary>
                            <div style="margin-top:6px;">${kbSection}${userSection}${agentSection}</div>

                    }
                    sentinelHtml = `<div class="sentinel-card">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                            <span style="font-size:10px;color:#8b949e;">🛡️ Sentinel</span>

                        </div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;">${dims}</div>

                    factsHtml = `<div style="background:#0d1a0d;border:1px solid #3fb95033;border-radius:6px;padding:6px 10px;margin-top:4px;">

                // Handoff card

                        ${r.classify_ms != null ? `<span style="color:#8b949e;font-size:10px;">router ${r.classify_ms}ms</span>` : ''}

            // Auto-scroll to bottom (newest turn) — matches event stream direction
            if (document.getElementById('autoScroll').checked) {
                const tp = document.getElementById('turnPanel');
                tp.scrollTop = tp.scrollHeight; // scroll to bottom to show newest
            }
        }


        function renderRawEvent(ev) {
            const ph = document.getElementById('streamPlaceholder');
            if (ph) ph.remove();
            const stream = document.getElementById('eventStream');
            const details = Object.entries(ev)
                .filter(([k]) => !['type', 'reqId', 'step', 'ts'].includes(k))
                .map(([k, v]) => {
                    let val = typeof v === 'obj ect' ? JSON.stringify(v) : String(v ?? '—');
                    if (['ttfb_ms', 'acq_ms', 'elapsed_ms'].includes(k)) {
                        const n = parseInt(val); const col = n < 300 ? '#3fb950' : n < 1000 ? '#e3b341' : '#f85149';
                        val = `<span style="color:${col};font-weight:600">${val}ms</span>`;
                    } else if (k === 'lastUserMsg') {
                        val = `<span class="text-[#c9d1d9] italic">"${esc(val)}"</span>`;
                    } else if (['model', 'fallback'].includes(k)) {
                        val = `<span class="text-[#c9d1d9] font-mono">${fmt.model(val)}</span>`;
                    } else if (k === 'backend') {
                        val = fmt.backend(val);
                    } else if (k === 'reason') {
                        val = `<span class="text-[#f85149]">${esc(val)}</span>`;
                    } else { val = `<span class="text-[#c9d1d9]">${esc(val)}</span>`; }
                    return `<span class="text-[#8b949e]">${k}=</span>${val}`;
                }).join(' <span class="text-[#30363d]">·</span> ');
            const entry = document.createElement('div');
            entry.className = 'new-row flex flex-wrap items-center gap-2 px-4 py-2 border-b border-[#21262d] text-xs';
            entry.innerHTML = `<span class="text-[#8b949e] w-16 shrink-0 font-mono">${fmt.time(ev.ts)}</span><span class="font-mono text-[#6e7681] text-[10px] w-12 shrink-0 truncate">${ev.reqId || ''}</span>${stepBadge(ev.step || '?')}<span class="flex flex-wrap gap-2 min-w-0">${details}</span>`;
            stream.appendChild(entry);
            while (stream.children.length > 300) stream.removeChild(stream.firstChild);
            if (document.getElementById('autoScroll').checked) stream.scrollTop = stream.scrollHeight;
        }

        function connectWebSocket() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            const workspace = document.getElementById('workspaceId').value || 'ampere-emily';
            const apiKey = document.getElementById('apiKey').value || '';
            const wsBase = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');
            const url = `${wsBase}/memory/visualizer?workspace=${encodeURIComponent(workspace)}&x-api-key=${encodeURIComponent(apiKey)}`;
            try {
                ws = new WebSocket(url);
                ws.onopen = () => setConn('connected', `WebSocket — ${workspace}`);
                ws.onmessage = e => { try { const d = JSON.parse(e.data); if (d.type === 'router_event') processEvent(d, false); } catch { } };
                ws.onerror = () => setConn('error', 'WS error — reconnecting...');
                ws.onclose = () => { setConn('polling', 'WS closed — reconnecting in 2s...'); setTimeout(connectWebSocket, 2000); };
            } catch { setConn('error', 'WS unavailable — retrying in 2s...'); setTimeout(connectWebSocket, 2000); }
        }


        function setConn(state, label) {
            const dot = document.getElementById('connDot'), lbl = document.getElementById('connLabel');
            dot.className = `conn-indicator conn-${state}`;
            if (state === 'connected') dot.classList.add('live-dot'); else dot.classList.remove('live-dot');
            lbl.textContent = label;
        }

        let seenEventKeys = new Set();
        let lastPollTs = 0;
        function clearAll() {
            routeMap = {}; seenReqIds = new Set(); seenEventKeys = new Set(); totalEvents = 0; sessionStart = Date.now(); lastPollTs = 0;
            document.getElementById('routingTbody').innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-[#8b949e] text-xs">Cleared — waiting for next call…</td></tr>';
            document.getElementById('turnPanel').innerHTML = '<div class="px-4 py-6 text-center text-[#8b949e] text-xs" id="turnPlaceholder">Cleared…</div>';
            document.getElementById('eventStream').innerHTML = '';
            document.getElementById('eventCount').textContent = '0 events';
            document.getElementById('routeCount').textContent = '0 turns';
            document.getElementById('turnCount').textContent = '0 turns';
        }

        function reconnect() {
            if (ws) { try { ws.close(); } catch { } } if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            setConn('polling', 'Reconnecting...'); connectWebSocket();
        }

        document.getElementById('filterTier').addEventListener('change', renderRoutingTable);
        document.getElementById('filterResult').addEventListener('change', renderRoutingTable);
        document.getElementById('filterLang').addEventListener('change', renderRoutingTable);

        function updateSessionGauge(avg) {
            const el = document.getElementById('sessionGauge');
            const label = document.getElementById('sessionAvgLabel');
            el.style.display = 'inline-flex';
            const cls = avg >= 8 ? 'gauge-green' : avg >= 6 ? 'gauge-yellow' : 'gauge-red';
            el.className = `session-gauge ${cls}`;
            const icon = avg >= 8 ? '✅' : avg >= 6 ? '⚠️' : '🔴';
            label.textContent = `${icon} ${avg.toFixed(1)}`;
        }

        function copyEventLog() {
            const stream = document.getElementById('eventStream');
            const entries = stream.querySelectorAll('.new-row');
            if (!entries.length) return;
            const lines = Array.from(entries).map(el => {
                // Extract text content, clean up whitespace
                return el.textContent.replace(/\s+/g, ' ').trim();
            });
            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyLogBtn');
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                btn.style.color = '#3fb950';
                setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
            }).catch(() => {
                // Fallback for non-secure contexts
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        window.addEventListener('DOMContentLoaded', () => { connectWebSocket(); });
    </script>
</body>

</html>
