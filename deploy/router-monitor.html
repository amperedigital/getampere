<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="v3.359">
    <title>Ampere Router Monitor</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/amperedigital/getampere@v3.359/deploy/assets/css/styles.css">
    <style>
        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(-4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .live-dot {
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .new-row {
            animation: slide-in 0.2s ease-out;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.025);
        }

        .tier-t1 {
            color: #58a6ff;
        }

        .tier-t2 {
            color: #a371f7;
        }

        .result-ok {
            color: #3fb950;
        }

        .result-fallback {
            color: #e3b341;
        }

        .result-error {
            color: #f85149;
        }

        .step-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'DM Sans', monospace;
            letter-spacing: 0.03em;
        }

        .step-CLASSIFY {
            background: #1c2d3f;
            color: #58a6ff;
        }

        .step-T1_ATTEMPT {
            background: #1a2a1c;
            color: #3fb950;
        }

        .step-T1_ACQUIRED {
            background: #1a2730;
            color: #79c0ff;
        }

        .step-T1_FIRST_BYTE {
            background: #1e2d13;
            color: #7ee787;
        }

        .step-T1_TOOL_CALL {
            background: #2d1f0a;
            color: #e3b341;
        }

        .step-T1_FALLBACK {
            background: #2d1e00;
            color: #f0883e;
            border: 1px solid #f0883e44;
        }

        .step-T2_ATTEMPT {
            background: #251a3b;
            color: #a371f7;
        }

        .step-T2_FALLBACK {
            background: #3b1a1f;
            color: #f85149;
            border: 1px solid #f8514944;
        }

        .step-T2_FIRST_BYTE {
            background: #2a1e3a;
            color: #d2a8ff;
        }

        .badge-wai {
            background: #1a2d1a;
            color: #3fb950;
        }

        .badge-gemini {
            background: #1e2340;
            color: #79c0ff;
        }

        .badge-openai {
            background: #1a1a1a;
            color: #8b949e;
        }

        .panel-scroll {
            max-height: calc(100vh - 260px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #30363d #0d1117;
        }

        .conn-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .conn-connected {
            background: #3fb950;
        }

        .conn-polling {
            background: #e3b341;
        }

        .conn-error {
            background: #f85149;
        }

        /* Turn card */
        .turn-card {
            border-left: 3px solid;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 0 8px 8px 0;
            background: #0d1117;
        }

        .turn-card.tier1 {
            border-color: #58a6ff22;
        }

        .turn-card.tier2 {
            border-color: #a371f722;
        }

        .turn-card.active {
            border-color: #58a6ff;
        }

        .turn-user-msg {
            color: #e6edf3;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .turn-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            color: #8b949e;
            align-items: center;
        }

        .ttfb-fast {
            color: #3fb950;
            font-weight: 600;
        }

        .ttfb-med {
            color: #e3b341;
            font-weight: 600;
        }

        .ttfb-slow {
            color: #f85149;
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-[#0d1117] text-[#e6edf3] min-h-screen p-4 sm:p-6">

    <!-- Header -->
    <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
        <div>
            <h1 class="text-xl font-bold text-blue-400 mb-0.5">⚡ Ampere Router Monitor</h1>
            <p class="text-xs text-[#8b949e]">Live routing — showing only events since page load / last clear</p>
        </div>
        <div id="connStatus"
            class="flex items-center gap-2 text-xs text-[#8b949e] bg-[#161b22] border border-[#30363d] px-3 py-1.5 rounded-full">
            <span id="connDot" class="conn-indicator conn-polling live-dot"></span>
            <span id="connLabel">Connecting...</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap gap-2 mb-5 items-center">
        <input type="text" id="apiKey" placeholder="x-api-key" value="dev-secret-key"
            class="bg-[#161b22] border border-[#30363d] text-[#e6edf3] px-3 py-1.5 rounded-md text-xs font-mono w-44 focus:outline-none focus:border-blue-500">
        <input type="text" id="workspaceId" placeholder="workspace (emily)" value="emily"
            class="bg-[#161b22] border border-[#30363d] text-[#e6edf3] px-3 py-1.5 rounded-md text-xs font-mono w-36 focus:outline-none focus:border-blue-500">
        <button onclick="clearAll()"
            class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] text-[#8b949e] px-3 py-1.5 rounded-md text-xs cursor-pointer transition-colors">
            🗑 Clear + Reset
        </button>
        <button onclick="reconnect()"
            class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-1.5 rounded-md text-xs font-semibold cursor-pointer transition-colors">
            ⟳ Reconnect
        </button>
        <span class="text-xs text-[#8b949e] ml-auto" id="eventCount">0 events</span>
    </div>

    <!-- Two-panel layout: Turn-by-Turn | Raw Event Stream -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

        <!-- Panel A: Turn-by-Turn Analysis -->
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
            <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between">
                <h2 class="text-sm font-semibold text-[#e6edf3]">Turn-by-Turn Analysis</h2>
                <span class="text-xs text-[#8b949e]" id="turnCount">0 turns</span>
            </div>
            <div class="panel-scroll px-3 py-2" id="turnPanel">
                <div class="px-4 py-8 text-center text-[#8b949e] text-xs" id="turnPlaceholder">Waiting for conversation…
                </div>
            </div>
        </div>

        <!-- Panel B: Live Event Stream -->
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
            <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between">
                <h2 class="text-sm font-semibold text-[#e6edf3]">Raw Event Stream</h2>
                <label class="text-xs text-[#8b949e] flex items-center gap-1.5 cursor-pointer">
                    <input type="checkbox" id="autoScroll" checked class="accent-blue-500"> auto-scroll
                </label>
            </div>
            <div class="panel-scroll" id="eventStream">
                <div class="px-4 py-8 text-center text-[#8b949e] text-xs" id="streamPlaceholder">Waiting for events…
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Config ────────────────────────────────────────────────────────────────────
        const API_BASE = window.location.origin.includes('localhost')
            ? 'http://localhost:8787'
            : 'https://memory-api.tight-butterfly-7b71.workers.dev';

        // Only show events that arrive AFTER this timestamp (set on page load / clear)
        let sessionStart = Date.now();

        let routeMap = {};   // reqId → aggregated turn data
        let totalEvents = 0;
        let pollInterval = null;
        let ws = null;
        let seenReqIds = new Set(); // dedup: don't re-add entries from poll that we already have

        // ── Format helpers ────────────────────────────────────────────────────────────
        const fmt = {
            time: ts => new Date(ts).toLocaleTimeString('en-US', { hour12: false }),
            ms: v => v != null ? `${v}ms` : '—',
            model: m => {
                if (!m) return '—';
                return m.replace('@cf/ibm-granite/', '').replace('@cf/meta/', '').replace('@cf/google/', '')
                    .replace('gemini:', '').replace('openai:', '')
                    .replace('-instruct', '').replace('-fp8-fast', '');
            },
            backend: b => {
                const cls = b === 'workersai' ? 'badge-wai' : b === 'gemini' ? 'badge-gemini' : 'badge-openai';
                const label = b === 'workersai' ? 'Workers AI' : b === 'gemini' ? 'Gemini' : 'OpenAI';
                return `<span class="step-badge ${cls}">${label}</span>`;
            },
            ttfb: ms => {
                if (ms == null) return '<span class="text-[#8b949e]">—</span>';
                const cls = ms < 300 ? 'ttfb-fast' : ms < 1000 ? 'ttfb-med' : 'ttfb-slow';
                return `<span class="${cls}">${ms}ms</span>`;
            },
            tier: t => {
                if (!t) return '—';
                const cls = t === 'tier1' ? 'tier-t1' : 'tier-t2';
                return `<span class="${cls} font-bold text-xs">${t === 'tier1' ? 'T1' : 'T2'}</span>`;
            }
        };

        function stepBadge(step) {
            return `<span class="step-badge step-${step}">${step}</span>`;
        }

        // ── Core event processor ──────────────────────────────────────────────────────
        function processEvent(ev, fromPoll = false) {
            if (!ev || ev.type !== 'router_event') return;

            // LIVE ONLY: ignore anything older than session start
            const evTs = ev.ts || 0;
            if (evTs < sessionStart) return;

            const { reqId, step } = ev;
            if (!reqId) return;

            totalEvents++;
            document.getElementById('eventCount').textContent = `${totalEvents} events`;

            // Build / update turn entry
            if (!routeMap[reqId]) {
                if (seenReqIds.has(reqId) && fromPoll) return; // already processed from WS
                routeMap[reqId] = {
                    reqId, ts: evTs,
                    tier: null, model: null, backend: null,
                    acq_ms: null, ttfb_ms: null,
                    tools: [], result: null, fallback: null,
                    lastUserMsg: '', userTurns: 0
                };
            }
            seenReqIds.add(reqId);

            const row = routeMap[reqId];

            if (step === 'CLASSIFY') {
                row.tier = ev.tier;
                row.userTurns = ev.userTurns;
                row.lastUserMsg = ev.lastUserMsg || '';
            }
            if (step === 'T1_ATTEMPT') {
                row.tier = 'tier1'; row.model = ev.model; row.backend = ev.backend;
            }
            if (step === 'T2_ATTEMPT') {
                row.tier = 'tier2'; row.model = ev.model; row.backend = ev.backend;
            }
            if (step === 'T1_ACQUIRED') {
                row.acq_ms = ev.acq_ms;
                if (!row.model) row.model = ev.model;
                if (!row.backend) row.backend = ev.backend;
            }
            if (step === 'T1_FIRST_BYTE' || step === 'T2_FIRST_BYTE') {
                row.ttfb_ms = ev.ttfb_ms;
                row.result = 'ok';
                if (!row.model && ev.model) row.model = ev.model;
            }
            if (step === 'T1_TOOL_CALL') {
                if (!row.tools.includes(ev.tool)) row.tools.push(ev.tool);
            }
            if (step === 'T1_FALLBACK' || step === 'T2_FALLBACK') {
                row.result = 'fallback';
                row.fallback = ev.fallback;
            }

            renderTurnPanel();
            renderRawEvent(ev);
        }

        // ── Turn-by-Turn Panel ────────────────────────────────────────────────────────
        function renderTurnPanel() {
            const turns = Object.values(routeMap).sort((a, b) => b.ts - a.ts);
            document.getElementById('turnCount').textContent = `${turns.length} turns`;

            const container = document.getElementById('turnPanel');
            const ph = document.getElementById('turnPlaceholder');
            if (ph) ph.remove();

            container.innerHTML = turns.map(r => {
                const tierCls = r.tier === 'tier1' ? 'tier1' : 'tier2';
                const isActive = !r.result;
                const modelStr = r.model ? fmt.model(r.model) : '…';
                const backendHtml = r.backend ? fmt.backend(r.backend) : '';
                const toolsHtml = r.tools.length
                    ? r.tools.map(t => `<span class="step-badge step-T1_TOOL_CALL">${t}</span>`).join(' ')
                    : '';
                const resultHtml = r.result === 'ok'
                    ? '<span class="result-ok">✅ ok</span>'
                    : r.result === 'fallback'
                        ? `<span class="result-fallback">⚠️ fallback → ${fmt.model(r.fallback)}</span>`
                        : '<span class="text-[#8b949e]">⏳</span>';

                const userMsgHtml = r.lastUserMsg
                    ? `<div class="turn-user-msg">"${escHtml(r.lastUserMsg)}"</div>`
                    : '<div class="turn-user-msg text-[#8b949e] italic">Emily greeting / system turn</div>';

                const acqHtml = r.acq_ms != null ? `<span>acq <span class="text-[#c9d1d9]">${r.acq_ms}ms</span></span>` : '';

                return `<div class="turn-card ${tierCls} ${isActive ? 'active' : ''}">
                    ${userMsgHtml}
                    <div class="turn-meta">
                        <span class="text-[#8b949e] font-mono">${fmt.time(r.ts)}</span>
                        ${fmt.tier(r.tier)}
                        <span class="font-semibold text-[#c9d1d9] font-mono">${modelStr}</span>
                        ${backendHtml}
                        ${acqHtml}
                        <span>TTFB ${fmt.ttfb(r.ttfb_ms)}</span>
                        ${toolsHtml}
                        ${resultHtml}
                    </div>
                </div>`;
            }).join('');
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── Raw Event Stream ──────────────────────────────────────────────────────────
        function renderRawEvent(ev) {
            const placeholder = document.getElementById('streamPlaceholder');
            if (placeholder) placeholder.remove();

            const stream = document.getElementById('eventStream');
            const { reqId, step, ts } = ev;

            const details = Object.entries(ev)
                .filter(([k]) => !['type', 'reqId', 'step', 'ts'].includes(k))
                .map(([k, v]) => {
                    let val = typeof v === 'object' ? JSON.stringify(v) : String(v ?? '—');
                    if (['ttfb_ms', 'acq_ms', 'elapsed_ms'].includes(k)) {
                        const n = parseInt(val);
                        const col = n < 300 ? '#3fb950' : n < 1000 ? '#e3b341' : '#f85149';
                        val = `<span style="color:${col};font-weight:600">${val}ms</span>`;
                    } else if (k === 'lastUserMsg') {
                        val = `<span class="text-[#c9d1d9] italic">"${escHtml(val.slice(0, 80))}"</span>`;
                    } else if (['model', 'fallback'].includes(k)) {
                        val = `<span class="text-[#c9d1d9] font-mono">${fmt.model(val)}</span>`;
                    } else if (k === 'backend') {
                        val = fmt.backend(val);
                    } else if (k === 'reason') {
                        val = `<span class="text-[#f85149]">${escHtml(val)}</span>`;
                    } else {
                        val = `<span class="text-[#c9d1d9]">${escHtml(val)}</span>`;
                    }
                    return `<span class="text-[#8b949e]">${k}=</span>${val}`;
                })
                .join(' <span class="text-[#30363d]">·</span> ');

            const entry = document.createElement('div');
            entry.className = 'new-row flex flex-wrap items-center gap-2 px-4 py-2 border-b border-[#21262d] text-xs';
            entry.innerHTML = `
                <span class="text-[#8b949e] w-16 shrink-0 font-mono">${fmt.time(ts)}</span>
                <span class="font-mono text-[#6e7681] text-[10px] w-12 shrink-0 truncate">${reqId || ''}</span>
                ${stepBadge(step || '?')}
                <span class="flex flex-wrap gap-2 min-w-0">${details}</span>
            `;
            stream.appendChild(entry);
            while (stream.children.length > 300) stream.removeChild(stream.firstChild);
            if (document.getElementById('autoScroll').checked) stream.scrollTop = stream.scrollHeight;
        }

        // ── WebSocket ─────────────────────────────────────────────────────────────────
        function connectWebSocket() {
            const workspace = document.getElementById('workspaceId').value || 'emily';
            const apiKey = document.getElementById('apiKey').value || '';
            const wsBase = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');
            const url = `${wsBase}/memory/visualizer?workspace=${encodeURIComponent(workspace)}&x-api-key=${encodeURIComponent(apiKey)}`;

            try {
                ws = new WebSocket(url);
                ws.onopen = () => setConn('connected', `WebSocket — ${workspace}`);
                ws.onmessage = e => {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.type === 'router_event') processEvent(data, false);
                    } catch { }
                };
                ws.onerror = () => setConn('error', 'WebSocket error — polling');
                ws.onclose = () => { setConn('polling', 'WebSocket closed — polling'); startPolling(); };
            } catch {
                setConn('error', 'WS unavailable — polling');
                startPolling();
            }
        }

        // ── Polling fallback (live-only) ──────────────────────────────────────────────
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            fetchLog();
            pollInterval = setInterval(fetchLog, 2000);
        }

        async function fetchLog() {
            const workspace = document.getElementById('workspaceId').value || 'emily';
            const apiKey = document.getElementById('apiKey').value || '';
            try {
                const res = await fetch(`${API_BASE}/llm/router-log?workspace=${encodeURIComponent(workspace)}&n=100`, {
                    headers: { 'x-api-key': apiKey }
                });
                if (!res.ok) throw new Error(res.status);
                const { events } = await res.json();
                // Only process events newer than sessionStart — live-only
                (events || [])
                    .filter(ev => (ev.ts || 0) >= sessionStart)
                    .forEach(ev => processEvent(ev, true));
                setConn('polling', `Polling (${workspace})`);
            } catch (e) {
                setConn('error', `Poll error: ${e.message}`);
            }
        }

        function setConn(state, label) {
            const dot = document.getElementById('connDot');
            const lbl = document.getElementById('connLabel');
            dot.className = `conn-indicator conn-${state}`;
            if (state === 'connected') dot.classList.add('live-dot'); else dot.classList.remove('live-dot');
            lbl.textContent = label;
        }

        // ── Controls ──────────────────────────────────────────────────────────────────
        function clearAll() {
            routeMap = {};
            seenReqIds = new Set();
            totalEvents = 0;
            sessionStart = Date.now(); // Reset: only show events from NOW
            document.getElementById('turnPanel').innerHTML = '<div class="px-4 py-8 text-center text-[#8b949e] text-xs" id="turnPlaceholder">Cleared — waiting for next conversation…</div>';
            document.getElementById('eventStream').innerHTML = '';
            document.getElementById('eventCount').textContent = '0 events';
            document.getElementById('turnCount').textContent = '0 turns';
        }

        function reconnect() {
            if (ws) { try { ws.close(); } catch { } }
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            setConn('polling', 'Reconnecting...');
            connectWebSocket();
        }

        // ── Init ──────────────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            setTimeout(fetchLog, 500);
        });
    </script>

</body>

</html>
